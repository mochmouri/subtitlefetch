<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arabic Subtitles</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header>
    <span>Arabic Subtitles</span>
    <button id="settings-btn" title="Settings">&#9881;</button>
  </header>

  <!-- ── Main view ─────────────────────────────────────────────────────────── -->
  <div id="main-view">

    <div id="search-row">
      <input
        id="search-input"
        type="text"
        placeholder="Movie or show title"
        autocomplete="off"
        spellcheck="false"
      >
      <button id="search-btn">Search</button>
    </div>

    <div id="status-bar"></div>

    <div id="results-section" hidden>
      <ul id="results-list"></ul>
    </div>

    <div id="loaded-section" hidden>
      <div id="loaded-info">
        <span id="loaded-name"></span>
        <button id="remove-btn">Remove</button>
      </div>
    </div>

    <div id="offset-section">
      <div id="offset-header">
        <label for="offset-slider">Sync offset</label>
        <span id="offset-display">0.0 s</span>
      </div>
      <input
        id="offset-slider"
        type="range"
        min="-10"
        max="10"
        step="0.5"
        value="0"
      >
    </div>

  </div>

  <!-- ── Settings view ─────────────────────────────────────────────────────── -->
  <div id="settings-view" hidden>
    <label for="api-key-input">OpenSubtitles API Key</label>
    <input
      id="api-key-input"
      type="text"
      placeholder="Paste your API key"
      autocomplete="off"
      spellcheck="false"
    >
    <div id="settings-actions">
      <button id="save-key-btn">Save</button>
      <button id="cancel-settings-btn">Cancel</button>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
