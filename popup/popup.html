<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arabic Subtitles</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header>
    <span>Arabic Subtitles</span>
    <div class="header-actions">
      <button id="history-btn" title="History">&#128337;</button>
      <button id="settings-btn" title="Settings">&#9881;</button>
    </div>
  </header>

  <!-- ── Main view ─────────────────────────────────────────────────────────── -->
  <div id="main-view">

    <div id="search-row">
      <input
        id="search-input"
        type="text"
        placeholder="Movie or show title"
        autocomplete="off"
        spellcheck="false"
      >
      <button id="search-btn">Search</button>
    </div>

    <div id="status-bar"></div>

    <div id="results-section" hidden>
      <ul id="results-list"></ul>
    </div>

    <div id="loaded-section" hidden>
      <div id="loaded-info">
        <span id="loaded-name"></span>
        <button id="remove-btn">Remove</button>
      </div>
    </div>

    <div id="offset-section">
      <div id="offset-header">
        <label for="offset-slider">Sync offset</label>
        <span id="offset-display">0.0 s</span>
      </div>
      <input
        id="offset-slider"
        type="range"
        min="-10"
        max="10"
        step="0.5"
        value="0"
      >
    </div>

  </div>

  <!-- ── History view ──────────────────────────────────────────────────────── -->
  <div id="history-view" hidden>
    <div class="view-header">
      <span>Recent subtitles</span>
      <button id="close-history-btn">&#10005;</button>
    </div>
    <div id="history-empty" class="view-empty">No history yet.</div>
    <ul id="history-list"></ul>
  </div>

  <!-- ── Settings view ─────────────────────────────────────────────────────── -->
  <div id="settings-view" hidden>
    <div class="view-header">
      <span>Settings</span>
      <button id="cancel-settings-btn">&#10005;</button>
    </div>

    <div class="settings-group">
      <div class="settings-label-row">
        <label for="api-key-input">OpenSubtitles API Key</label>
      </div>
      <div class="settings-row">
        <input
          id="api-key-input"
          type="text"
          placeholder="Paste your API key"
          autocomplete="off"
          spellcheck="false"
        >
        <button id="save-key-btn">Save</button>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-label-row">
        <label for="font-size-input">Font size</label>
        <span id="font-size-display">24px</span>
      </div>
      <input id="font-size-input" type="range" min="16" max="40" step="1" value="24">
    </div>

    <div class="settings-group">
      <div class="settings-label-row">
        <label for="text-color-input">Text color</label>
      </div>
      <input id="text-color-input" type="color" value="#ffffff">
    </div>

    <div class="settings-group">
      <div class="settings-label-row">
        <label for="bg-opacity-input">Background opacity</label>
        <span id="bg-opacity-display">60%</span>
      </div>
      <input id="bg-opacity-input" type="range" min="0" max="100" step="5" value="60">
    </div>

    <div class="settings-group">
      <div class="settings-label-row">
        <label for="font-family-input">Font family</label>
      </div>
      <select id="font-family-input">
        <option value="system">System default</option>
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="Courier New">Courier</option>
        <option value="Verdana">Verdana</option>
      </select>
    </div>

    <div class="settings-group">
      <label class="settings-checkbox-label">
        <input id="text-shadow-input" type="checkbox">
        Text shadow (helps on bright scenes)
      </label>
    </div>

  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
